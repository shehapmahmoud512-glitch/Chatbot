<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول الإدارة | Sphinx University</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #0f172a;
            --surface: #1e293b;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --error: #ef4444;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
        }

        .login-card {
            background-color: var(--surface);
            padding: 3rem;
            border-radius: 1.5rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            margin-bottom: 2rem;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 500;
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 0.875rem 1rem;
            border-radius: 0.75rem;
            background-color: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: rgba(15, 23, 42, 0.8);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            border: none;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        #error-msg {
            color: var(--error);
            text-align: center;
            margin-top: 1rem;
            font-size: 0.9rem;
            font-weight: 500;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 2rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: var(--text-light);
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo">لوحة الإدارة</div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>اسم المستخدم</label>
                <input type="text" id="username" required autocomplete="off">
            </div>
            
            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" id="password" required>
            </div>
            
            <button type="submit" class="btn-submit">تسجيل الدخول</button>
            <div id="error-msg"></div>
        </form>
        
        <a href="/" class="back-link">← العودة للصفحة الرئيسية</a>
    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.querySelector(".btn-submit");
            const errorMsg = document.getElementById("error-msg");
            
            btn.innerHTML = "جاري التحقق...";
            btn.disabled = true;
            errorMsg.style.opacity = "0";

            const username = document.getElementById("username").value;
            const password = document.getElementById("password").value;

            try {
                const res = await fetch("/admin/login", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    btn.innerHTML = "تم بنجاح!";
                    btn.style.background = "#10b981";
                    setTimeout(() => {
                        window.location.href = "/admin/dashboard";
                    }, 500);
                } else {
                    errorMsg.innerText = data.error || "حدث خطأ ما";
                    errorMsg.style.opacity = "1";
                    btn.innerHTML = "تسجيل الدخول";
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "خطأ في الاتصال بالخادم";
                errorMsg.style.opacity = "1";
                btn.innerHTML = "تسجيل الدخول";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
