<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الإدارة | Sphinx University</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --bg-color: #0f172a;
            --surface: #1e293b;
            --surface-hover: #334155;
            --text-light: #f8fafc;
            --text-muted: #94a3b8;
            --success: #10b981;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg-color));
            min-height: 100vh;
        }

        .navbar {
            background-color: rgba(30, 41, 59, 0.8);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #a855f7, #6366f1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn:hover {
            background: rgba(239, 68, 68, 0.8);
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background-color: var(--surface);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card-header {
            margin-bottom: 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 1rem;
        }

        .card-header h2 {
            margin: 0;
            font-size: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .card-header p {
            color: var(--text-muted);
            margin: 0.5rem 0 0 0;
            font-size: 0.95rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 0.5rem;
            color: var(--text-muted);
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 1rem;
            border-radius: 0.75rem;
            background-color: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-light);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.2);
            background-color: rgba(15, 23, 42, 0.8);
        }

        .btn-save {
            background: linear-gradient(135deg, var(--primary), #6366f1);
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 0.75rem;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            width: 100%;
            justify-content: center;
            margin-top: 2rem;
        }

        .btn-save:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4);
        }

        #toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background-color: var(--success);
            color: white;
            padding: 1rem 2rem;
            border-radius: 2rem;
            font-weight: 600;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            display: flex;
            align-items: center;
            gap: 0.5rem;
            z-index: 1000;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="navbar-brand">
            <i class="fa-solid fa-shield-halved"></i>
            لوحة الإدارة
        </div>
        <button class="logout-btn" onclick="logout()">
            <i class="fa-solid fa-arrow-right-from-bracket"></i>
            تسجيل الخروج
        </button>
    </nav>

    <div class="container">
        <div class="card">
            <div class="card-header">
                <h2><i class="fa-solid fa-database"></i> تحديث بيانات الجامعة</h2>
                <p>البيانات المدخلة هنا سيتم تحديثها فوراً في ذاكرة الذكاء الاصطناعي ليتمكن من الرد بها على الطلاب.</p>
            </div>

            <form id="settingsForm">
                <div class="form-group">
                    <label><i class="fa-solid fa-calendar-check"></i> الموعد النهائي لدفع المصاريف</label>
                    <input type="text" id="tuition_deadline" placeholder="مثال: 15 أكتوبر 2026">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-person-military-rifle"></i> مواعيد التربية العسكرية</label>
                    <input type="text" id="military_dates" placeholder="مثال: من 1 نوفمبر إلى 15 نوفمبر 2026">
                </div>

                <div class="form-group">
                    <label><i class="fa-solid fa-bullhorn"></i> إعلانات هامة أخرى (اختياري)</label>
                    <input type="text" id="other_announcements" placeholder="أي قرارات إدارية جديدة...">
                </div>

                <button type="submit" class="btn-save">
                    <i class="fa-solid fa-floppy-disk"></i>
                    حفظ وتحديث البوت
                </button>
            </form>
        </div>
    </div>

    <div id="toast">
        <i class="fa-solid fa-circle-check"></i>
        <span>تم الحفظ والتحديث بنجاح!</span>
    </div>

    <script>
        // Load initial data
        window.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/admin/api/settings');
                if(res.status === 401) {
                    window.location.href = "/admin/login";
                    return;
                }
                const json = await res.json();
                if(json.success && json.data) {
                    document.getElementById('tuition_deadline').value = json.data['الموعد النهائي لدفع المصاريف'] || '';
                    document.getElementById('military_dates').value = json.data['مواعيد التربية العسكرية'] || '';
                    document.getElementById('other_announcements').value = json.data['إعلانات هامة أخرى'] || '';
                }
            } catch(e) {
                console.error("Failed to load settings");
            }
        });

        // Save data
        document.getElementById('settingsForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.querySelector('.btn-save');
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> جاري التحديث...';
            btn.disabled = true;

            const dataToSave = {
                'الموعد النهائي لدفع المصاريف': document.getElementById('tuition_deadline').value,
                'مواعيد التربية العسكرية': document.getElementById('military_dates').value,
                'إعلانات هامة أخرى': document.getElementById('other_announcements').value
            };

            // Remove empty keys
            Object.keys(dataToSave).forEach(key => {
                if(!dataToSave[key].trim()) delete dataToSave[key];
            });

            try {
                const res = await fetch('/admin/api/settings', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(dataToSave)
                });
                
                if(res.ok) {
                    showToast();
                } else {
                    alert("حدث خطأ أثناء الحفظ");
                }
            } catch(e) {
                alert("خطأ في الاتصال");
            } finally {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }
        });

        async function logout() {
            await fetch('/admin/logout', { method: 'POST' });
            window.location.href = '/admin/login';
        }

        function showToast() {
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
